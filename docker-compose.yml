version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://nav_user:nav_pass@postgres:5432/immigration_db
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: immigration_db
      POSTGRES_USER: nav_user
      POSTGRES_PASSWORD: nav_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nav_user -d immigration_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: